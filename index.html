<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TIMER</h1>
    <div id="display">
        00:00:00
    </div>

    <div id="containerTime">
        <label >
            Horas:
            <input type="number" id="horas" min="0" max="23" value="0">
        </label>

        <label>
            Minutos:
            <input type="number" id="minutos" min="0" max="59" value="0">
        </label>

        <label>
            Segundos:
            <input type="number" id="segundos" min="0" max="59" value="0">
        </label>
    </div>
    <div id="containerBtn">
        <button id="startBtn" onclick="start()">Iniciar</button>
        <button id="stopBtn"  onclick="stop()">Stop</button>
        <button id="resetBtn" onclick="reset()">Reset</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
